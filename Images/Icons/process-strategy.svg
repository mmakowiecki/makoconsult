<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Blueprint/map base -->
  <rect x="10" y="12" width="44" height="40" rx="2" ry="2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Route lines (strategic path) -->
  <path d="M 16 24 Q 28 20 40 28 T 52 40" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Waypoints along the route -->
  <circle cx="16" cy="24" r="2.5" fill="currentColor"/>
  <circle cx="28" cy="20" r="2.5" fill="currentColor"/>
  <circle cx="40" cy="28" r="2.5" fill="currentColor"/>
  <circle cx="50" cy="40" r="2.5" fill="currentColor"/>
  
  <!-- Secondary planning lines (grid suggest framework) -->
  <line x1="22" y1="40" x2="42" y2="40" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.5" stroke-dasharray="2,2"/>
  <line x1="16" y1="32" x2="16" y2="48" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.5" stroke-dasharray="2,2"/>
