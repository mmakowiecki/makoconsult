<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Central hub node -->
  <circle cx="32" cy="32" r="5" fill="none" stroke="currentColor" stroke-width="2"/>
  <circle cx="32" cy="32" r="1.5" fill="currentColor"/>

  <!-- Channel 1: top-left message -->
  <rect x="6" y="6" width="18" height="13" rx="3" ry="3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="11" y1="11" x2="19" y2="11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="11" y1="15" x2="16" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Channel 2: top-right message -->
  <rect x="40" y="8" width="18" height="13" rx="3" ry="3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="45" y1="13" x2="53" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="45" y1="17" x2="50" y2="17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Channel 3: bottom-right message -->
  <rect x="42" y="43" width="16" height="13" rx="3" ry="3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="47" y1="48" x2="53" y2="48" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="47" y1="52" x2="51" y2="52" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Channel 4: bottom-left message -->
  <rect x="4" y="45" width="18" height="13" rx="3" ry="3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="9" y1="50" x2="17" y2="50" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="9" y1="54" x2="14" y2="54" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Connection lines from hub to channels -->
  <line x1="28" y1="28" x2="22" y2="19" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="36" y1="28" x2="42" y2="21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="36" y1="36" x2="44" y2="45" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="28" y1="36" x2="20" y2="45" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
</svg>
