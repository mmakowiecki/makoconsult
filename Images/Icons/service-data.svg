<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Bar chart - ascending bars -->
  <rect x="10" y="40" width="8" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="22" y="30" width="8" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="34" y="18" width="8" height="34" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="46" y="10" width="8" height="42" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Baseline -->
  <line x1="8" y1="52" x2="56" y2="52" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Circuit/node pattern overlay -->
  <circle cx="14" cy="36" r="2.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="26" cy="24" r="2.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="38" cy="12" r="2.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="50" cy="6" r="2.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Connecting lines between nodes -->
  <line x1="14" y1="36" x2="26" y2="24" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="26" y1="24" x2="38" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="38" y1="12" x2="50" y2="6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
</svg>
