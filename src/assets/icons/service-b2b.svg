<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Funnel / convergence shape -->
  <path d="M 12 16 L 32 36" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 52 16 L 32 36" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Left label dot (Sales) -->
  <circle cx="12" cy="16" r="3" fill="none" stroke="currentColor" stroke-width="2"/>
  <circle cx="12" cy="16" r="1" fill="currentColor"/>

  <!-- Right label dot (Marketing) -->
  <circle cx="52" cy="16" r="3" fill="none" stroke="currentColor" stroke-width="2"/>
  <circle cx="52" cy="16" r="1" fill="currentColor"/>

  <!-- Unified upward arrow from merge point -->
  <line x1="32" y1="36" x2="32" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <polyline points="26,18 32,12 38,18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Growth steps / funnel lines below -->
  <line x1="22" y1="44" x2="42" y2="44" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="18" y1="50" x2="46" y2="50" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="14" y1="56" x2="50" y2="56" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
</svg>
