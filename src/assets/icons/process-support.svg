<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Supporting bracket/frame underneath -->
  <path d="M 18 48 L 18 56 L 46 56 L 46 48" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Left supporting hand/curve -->
  <path d="M 26 42 Q 22 46 22 50" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="22" cy="42" r="3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Right supporting hand/curve -->
  <path d="M 38 42 Q 42 46 42 50" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="42" cy="42" r="3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Upward arrow being supported -->
  <line x1="32" y1="12" x2="32" y2="36" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <polygon points="32,8 28,16 36,16" fill="currentColor"/>
  
  <!-- Connection lines showing support -->
  <line x1="26" y1="40" x2="32" y2="36" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="38" y1="40" x2="32" y2="36" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
</svg>
